<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login - {{ company_info.razao_social }}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    :root {
      --lb-black:       #0d0d0d;
      --lb-carbon:      #1a1a1a;
      --lb-maroon:      #4a0a0a;
      --lb-red:         #c80a0a;
      --lb-red-bright:  #e51a1a;
      --lb-white:       #ffffff;
      --lb-grey:        #8a8a8a;
    }
    html, body { height: 100%; }
    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(135deg, var(--lb-maroon) 0%, var(--lb-black) 32%, var(--lb-carbon) 100%);
      color: var(--lb-white);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .login-wrapper {
      width: 100%;
      max-width: 920px;
      background: var(--lb-black);
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 25px 60px rgba(0,0,0,0.6);
      display: grid;
      grid-template-columns: 1fr 1fr;
      border: 1px solid rgba(255,255,255,0.05);
    }
    @media (max-width: 768px) {
      .login-wrapper { grid-template-columns: 1fr; max-width: 420px; }
    }

    .login-banner {
      background: var(--lb-black);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      overflow: hidden;
    }
    .login-banner img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    @media (max-width: 768px) {
      .login-banner { max-height: 220px; }
      .login-banner img { object-fit: contain; padding: 1rem; }
    }

    .login-form {
      padding: 2.5rem 2rem;
      background: var(--lb-carbon);
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .login-form h1 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: 1px;
      margin-bottom: .25rem;
      color: var(--lb-white);
    }
    .login-form h1 .accent { color: var(--lb-red-bright); }
    .login-form .subtitle {
      color: var(--lb-grey);
      font-size: .85rem;
      margin-bottom: 1.75rem;
    }

    .login-form .form-label {
      color: #c8c8c8;
      font-size: .8rem;
      letter-spacing: .5px;
      text-transform: uppercase;
      font-weight: 600;
      margin-bottom: .35rem;
    }
    .login-form .form-control {
      background-color: var(--lb-black);
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--lb-white);
      padding: .65rem .85rem;
    }
    .login-form .form-control:focus {
      background-color: var(--lb-black);
      color: var(--lb-white);
      border-color: var(--lb-red-bright);
      box-shadow: 0 0 0 .15rem rgba(229, 26, 26, 0.25);
    }
    .login-form .form-control::placeholder { color: #555; }

    .btn-lb-primary {
      background: linear-gradient(135deg, var(--lb-red-bright) 0%, var(--lb-red) 100%);
      color: var(--lb-white);
      border: none;
      padding: .75rem 1.25rem;
      font-weight: 600;
      letter-spacing: .5px;
      text-transform: uppercase;
      transition: transform .1s, box-shadow .15s, filter .15s;
    }
    .btn-lb-primary:hover { color: var(--lb-white); filter: brightness(1.1); box-shadow: 0 8px 20px rgba(229,26,26,.35); }
    .btn-lb-primary:active { transform: scale(.98); color: var(--lb-white); }
    .btn-lb-primary:disabled { opacity: .7; }

    .btn-toggle-senha {
      background: var(--lb-black);
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--lb-grey);
    }
    .btn-toggle-senha:hover { color: var(--lb-white); background: #222; }

    .signup-link {
      display: block;
      text-align: center;
      margin-top: 1.5rem;
      color: var(--lb-grey);
      text-decoration: none;
      font-size: .85rem;
    }
    .signup-link u { color: var(--lb-red-bright); }
    .signup-link:hover { color: #c8c8c8; }

    .alert {
      background: rgba(229, 26, 26, 0.12);
      border: 1px solid rgba(229, 26, 26, 0.4);
      color: #ffb4b4;
      font-size: .85rem;
    }
    .alert-success { background: rgba(40, 167, 69, 0.12); border-color: rgba(40, 167, 69, 0.4); color: #b4f0c0; }
    .alert-info { background: rgba(13, 110, 253, 0.12); border-color: rgba(13, 110, 253, 0.4); color: #b4d4ff; }
  </style>
</head>
<body>
  <div class="login-wrapper">
    <div class="login-banner">
      <img src="{{ url_for('static', filename='login_banner.png') }}"
           alt="{{ company_info.razao_social }}"
           onerror="this.onerror=null;this.src='{{ url_for('favicon') }}';this.style.objectFit='contain';this.style.padding='2rem';">
    </div>

    <div class="login-form">
      <h1>LB <span class="accent">AUTOCAR</span></h1>
      <p class="subtitle">Sistema de Gestão de Oficina</p>

      {% if error %}
        <div class="alert py-2 mb-3">{{ error }}</div>
      {% endif %}

      {% with messages = get_flashed_messages(with_categories=True) %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }} py-2 mb-3">{{ message }}</div>
        {% endfor %}
      {% endwith %}

      <form method="POST" id="login-form">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="mb-3">
          <label class="form-label">Usuário</label>
          <input type="text" name="username" class="form-control" autofocus required autocomplete="username">
        </div>
        <div class="mb-4">
          <label class="form-label">Senha</label>
          <div class="input-group">
            <input type="password" name="password" id="campo-senha" class="form-control" required autocomplete="current-password">
            <button class="btn btn-toggle-senha" type="button" id="btn-toggle-senha"
                    aria-label="Mostrar senha" title="Mostrar/ocultar senha">
              <i class="bi bi-eye" id="icone-senha"></i>
            </button>
          </div>
        </div>
        <button type="submit" class="btn btn-lb-primary w-100" id="login-button">
          <span class="spinner-border spinner-border-sm me-2 d-none" aria-hidden="true"></span>
          <span class="button-label">Entrar</span>
        </button>
      </form>

      <a href="{{ url_for('solicitar_cadastro') }}" class="signup-link">
        Não tem acesso? <u>Solicitar cadastro</u>
      </a>
    </div>
  </div>

  <script>
    document.getElementById('btn-toggle-senha').addEventListener('click', function() {
      const campo = document.getElementById('campo-senha');
      const icone = document.getElementById('icone-senha');
      if (campo.type === 'password') {
        campo.type = 'text';
        icone.classList.remove('bi-eye');
        icone.classList.add('bi-eye-slash');
      } else {
        campo.type = 'password';
        icone.classList.remove('bi-eye-slash');
        icone.classList.add('bi-eye');
      }
    });

    document.getElementById('login-form').addEventListener('submit', function() {
      const button = document.getElementById('login-button');
      button.disabled = true;
      button.querySelector('.spinner-border').classList.remove('d-none');
      button.querySelector('.button-label').textContent = 'Entrando...';
    });
  </script>
</body>
</html>
