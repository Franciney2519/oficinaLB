<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login - {{ company_info.razao_social }}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body { background: #212529; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .card { width: 100%; max-width: 380px; border-radius: 12px; }
    .logo-title { font-size: 1.4rem; font-weight: 700; letter-spacing: 1px; }
    .toggle-senha { cursor: pointer; }
  </style>
</head>
<body>
  <div class="card shadow-lg p-4">
    <div class="text-center mb-4">
      <div class="logo-title text-dark">{{ company_info.razao_social }}</div>
      <small class="text-muted">Sistema de Gestão de Oficina</small>
    </div>

    {% if error %}
    <div class="alert alert-danger py-2">{{ error }}</div>
    {% endif %}

    {% with messages = get_flashed_messages(with_categories=True) %}
      {% for category, message in messages %}
        <div class="alert alert-{{ category }} py-2">{{ message }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST" id="login-form">
      <div class="mb-3">
        <label class="form-label fw-semibold">Usuário</label>
        <input type="text" name="username" class="form-control" autofocus required>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold">Senha</label>
        <div class="input-group">
          <input type="password" name="password" id="campo-senha" class="form-control" required>
          <button class="btn btn-outline-secondary toggle-senha" type="button" id="btn-toggle-senha"
                  aria-label="Mostrar senha" title="Mostrar/ocultar senha">
            <i class="bi bi-eye" id="icone-senha"></i>
          </button>
        </div>
      </div>
      <button type="submit" class="btn btn-dark w-100" id="login-button">
        <span class="spinner-border spinner-border-sm me-2 d-none" aria-hidden="true"></span>
        <span class="button-label">Entrar</span>
      </button>
    </form>

    <div class="text-center mt-3">
      <a href="{{ url_for('solicitar_cadastro') }}" class="text-muted small text-decoration-none">
        Não tem acesso? <u>Solicitar cadastro</u>
      </a>
    </div>
  </div>
  <script>
    document.getElementById('btn-toggle-senha').addEventListener('click', function() {
      const campo = document.getElementById('campo-senha');
      const icone = document.getElementById('icone-senha');
      if (campo.type === 'password') {
        campo.type = 'text';
        icone.classList.remove('bi-eye');
        icone.classList.add('bi-eye-slash');
      } else {
        campo.type = 'password';
        icone.classList.remove('bi-eye-slash');
        icone.classList.add('bi-eye');
      }
    });

    document.getElementById('login-form').addEventListener('submit', function() {
      const button = document.getElementById('login-button');
      button.disabled = true;
      button.querySelector('.spinner-border').classList.remove('d-none');
      button.querySelector('.button-label').textContent = 'Entrando...';
    });
  </script>
</body>
</html>
